# ============================================================================
# ScholarAssist Dataset Pipeline — Docker Compose (Local Development)
# ============================================================================
# This stack provides a complete local development environment that mirrors
# the production AWS architecture using open-source, S3-compatible services.
#
# Services:
#   - MinIO:               S3-compatible object storage (Bronze/Silver/Gold layers)
#   - OpenSearch:           Full-text search and indexing engine
#   - OpenSearch Dashboards: Visual search and analytics UI
#   - Spark Master/Worker:  Distributed data processing
#   - Airflow:              Workflow orchestration (webserver + scheduler + init)
#   - PostgreSQL:           Airflow metadata database
#   - Redis:                Airflow Celery broker & API rate-limit backend
#   - API:                  FastAPI REST service
# ============================================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.spark
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'scholarassist-dev-secret-key'
    # MinIO / S3 configuration
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    AWS_ENDPOINT_URL: http://minio:9000
    AWS_DEFAULT_REGION: us-east-1
    # OpenSearch
    OPENSEARCH_URL: http://opensearch:9200
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./scripts:/opt/airflow/scripts
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  # --------------------------------------------------------------------------
  # Storage: MinIO (S3-compatible)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: scholarassist-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Create default buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: scholarassist-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/scholarassist-raw;
      mc mb --ignore-existing local/scholarassist-normalized;
      mc mb --ignore-existing local/scholarassist-golden;
      mc mb --ignore-existing local/scholarassist-manifests;
      mc mb --ignore-existing local/scholarassist-dead-letter;
      mc mb --ignore-existing local/scholarassist-logs;
      echo 'Buckets created successfully';
      exit 0;
      "

  # --------------------------------------------------------------------------
  # Search: OpenSearch
  # --------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: scholarassist-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"   # REST API
      - "9600:9600"   # Performance Analyzer
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    container_name: scholarassist-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Processing: Apache Spark
  # --------------------------------------------------------------------------
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: scholarassist-spark-master
    command: >
      bash -c "/opt/spark/sbin/start-master.sh && tail -f /opt/spark/logs/*"
    ports:
      - "7077:7077"   # Spark Master
      - "8081:8080"   # Spark Master UI
    environment:
      SPARK_MODE: master
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./src:/app/src
      - spark-logs:/opt/spark/logs

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: scholarassist-spark-worker
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /opt/spark/logs/*"
    ports:
      - "8082:8081"   # Spark Worker UI
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./src:/app/src
      - spark-logs:/opt/spark/logs
    depends_on:
      - spark-master

  # --------------------------------------------------------------------------
  # Orchestration: Apache Airflow
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: scholarassist-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scholarassist-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: scholarassist-airflow-init
    entrypoint: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@scholarassist.dev &&
      echo 'Airflow initialized'
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: scholarassist-airflow-webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/health | grep -q healthy"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: scholarassist-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------------
  # API: FastAPI
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: scholarassist-api
    ports:
      - "8000:8000"
    environment:
      SCHOLARASSIST_ENV: development
      OPENSEARCH_URL: http://opensearch:9200
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      REDIS_URL: redis://redis:6379/0
      API_SECRET_KEY: dev-secret-key-change-in-production
    volumes:
      - ./src:/app/src
    depends_on:
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  minio-data:
  opensearch-data:
  postgres-data:
  redis-data:
  airflow-logs:
  spark-logs:
